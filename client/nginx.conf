# Redirect HTTP → HTTPS, sauf le challenge ACME pour Certbot
server {
    listen 80;
    listen [::]:80;
    server_name arka.michaelrichaud.fr;

    # Webroot pour le renouvellement Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tout le reste → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Vrai serveur HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name arka.michaelrichaud.fr;

    # Certs Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/arka.michaelrichaud.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arka.michaelrichaud.fr/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Headers de sécurité
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(self)" always;

    # Compression
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/rss+xml
        font/woff
        font/woff2
        image/svg+xml
        text/css
        text/plain;

    # Body upload (médias Cloudinary passent en stream, mais on laisse de la marge)
    client_max_body_size 50m;

    # API → conteneur server (nom de service docker-compose)
    location /api/ {
        proxy_pass http://server:5003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }

    # Webhook Stripe : exception, le body raw doit rester intact
    location = /api/payments/webhook {
        proxy_pass http://server:5003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
    }

    # Service worker : pas de cache (pour autoUpdate vite-plugin-pwa)
    location = /sw.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /workbox-fc69c075.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Manifest PWA et icônes : court cache
    location ~* \.(webmanifest|json)$ {
        root /usr/share/nginx/html;
        expires 1h;
    }

    # Assets immutables (Vite met un hash dans le nom de fichier)
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fonts / images : 30 jours
    location ~* \.(woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public";
    }

    # SPA fallback : tout le reste → index.html
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
